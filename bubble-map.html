<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CORE — Living Aesthetic Bubble Map</title>
<style>
:root{--bg:#08090c;--panel:#101217;--line:#2a2e38;--text:#f4f5f7;--muted:#9298a5;--blue:#7aa7ff}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif}
.app{display:grid;grid-template-rows:auto 1fr;height:100%}.top{display:flex;align-items:center;gap:18px;padding:14px 18px;border-bottom:1px solid #20232a;background:rgba(8,9,12,.94);backdrop-filter:blur(12px);z-index:3}.brand{min-width:250px}.eyebrow{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#6f7684}.brand h1{font-size:17px;margin:2px 0 0;font-weight:650}.brand p{font-size:11px;color:var(--muted);margin:3px 0 0}.search{flex:1;max-width:440px;position:relative}.search input{width:100%;background:#14171d;border:1px solid #282c35;border-radius:999px;color:white;padding:10px 15px 10px 38px;outline:none}.search:before{content:'⌕';position:absolute;left:14px;top:7px;font-size:19px;color:#7d8491}.stats{margin-left:auto;display:flex;gap:18px;font-size:11px;color:var(--muted)}.stats b{color:white;font-size:15px;margin-right:4px}.workspace{display:grid;grid-template-columns:1fr 320px;min-height:0}.stage{position:relative;overflow:hidden}.stage canvas{width:100%;height:100%;display:block}.hint{position:absolute;left:16px;bottom:14px;background:rgba(12,14,18,.78);border:1px solid #252a33;border-radius:8px;padding:8px 10px;font-size:10px;color:#8e95a2;pointer-events:none}.side{border-left:1px solid #20232a;background:#0d0f13;padding:18px;overflow:auto}.empty{height:100%;display:grid;place-items:center;text-align:center;color:#69707d}.empty span{font-size:30px}.detail img{width:100%;aspect-ratio:16/10;object-fit:cover;border-radius:12px;background:#181b21}.cluster{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);margin-top:16px}.detail h2{font-size:24px;margin:6px 0 8px}.detail p{font-size:13px;line-height:1.6;color:#a8aeba}.meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}.meta div{border:1px solid #252a33;background:#13161b;padding:10px;border-radius:8px}.meta small{display:block;color:#707784;font-size:9px;text-transform:uppercase;letter-spacing:.12em}.meta b{font-size:13px}.tags{display:flex;flex-wrap:wrap;gap:6px}.tags span{font-size:10px;border:1px solid #2a2f39;color:#aeb4c0;padding:5px 7px;border-radius:999px}.open{display:block;margin-top:16px;text-decoration:none;text-align:center;border-radius:8px;background:white;color:#090a0d;padding:10px;font-size:12px;font-weight:700}.legend{position:absolute;right:16px;top:16px;display:grid;gap:5px;background:rgba(12,14,18,.84);border:1px solid #252a33;border-radius:10px;padding:10px;max-height:calc(100% - 40px);overflow:auto}.legend button{display:flex;align-items:center;gap:7px;background:none;border:0;color:#aab0ba;font-size:10px;padding:3px;text-align:left;cursor:pointer}.legend i{width:8px;height:8px;border-radius:50%;flex:none}.legend button.off{opacity:.28}@media(max-width:800px){.workspace{grid-template-columns:1fr}.side{display:none}.brand p,.stats{display:none}.brand{min-width:140px}.top{gap:8px}.legend{display:none}}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand"><div class="eyebrow">CORE INDEX</div><h1>Living Aesthetic Bubble Map</h1><p>Every indexed core, grouped by how culture is being aestheticized.</p></div>
    <label class="search"><input id="search" type="search" placeholder="Search any core..."></label>
    <div class="stats"><span><b id="nodeCount">—</b>cores</span><span><b id="clusterCount">12</b>fields</span><span><b id="imageCount">—</b>graphics</span></div>
  </header>
  <main class="workspace">
    <section class="stage" id="stage"><canvas id="map"></canvas><div class="legend" id="legend"></div><div class="hint">Drag to move · Scroll to zoom · Click a bubble to inspect · Double-click to open</div></section>
    <aside class="side" id="detail"><div class="empty"><div><span>∞</span><p>Select a core to inspect its field,<br>evidence density, and visual world.</p></div></div></aside>
  </main>
</div>
<script>
const ROOT='./';
const MANIFESTS=['./assets/cores/manifest.json'];
const CLUSTERS=[
{id:'dream',label:'Dream, memory & liminality',color:'#7086ff',hub:'Dreamcore',p:['dream','weird','nostalgia','trauma','glitch','gloom','cloud','pool','plaza','apocalypse','ghost','liminal','backroom','memory','sleep','nightmare','void','sad','surreal','haze']},
{id:'nature',label:'Nature, pastoral & ecological',color:'#5da87b',hub:'Naturecore',p:['nature','cottage','goblin','frog','mushroom','garden','bloom','honey','cabin','picnic','crow','gorp','adventure','jungle','tropical','grandma','craft','clutter','forest','swamp','farm','rain','autumn','winter','plant','flower','eco','rural']},
{id:'cute',label:'Childhood, cute & playful',color:'#e37fae',hub:'Kidcore',p:['kid','cute','baby','candy','sanrio','kuromi','loli','puppy','doll','barbie','melody','clown','toy','rainbow','cartoon','kawaii','pastel','child']},
{id:'digital',label:'Digital, web & synthetic',color:'#4da8c7',hub:'Webcore',p:['web','cyber','chrome','arcade','gamer','robot','scene','nerd','anime','oldweb','y2k','frutiger','vaporwave','synthwave','retrowave','corecore','meme','viral','tiktok','twitter','reddit','internet','digital','pixel','computer','windows','tech']},
{id:'fantasy',label:'Fantasy, myth & spiritual worlds',color:'#9c78df',hub:'Fairycore',p:['fairy','angel','devil','witch','wizard','dragon','knight','royal','king','queen','prince','princess','goddess','changeling','bard','mermaid','heaven','elf','magic','myth','fantasy','spirit']},
{id:'dark',label:'Dark, horror & bodily',color:'#99777d',hub:'Horrorcore',p:['horror','gore','meat','medical','teeth','plague','cryptid','nautical','heist','hospital','vamp','goth','death','blood','corpse','occult','demon']},
{id:'fashion',label:'Fashion, identity & social style',color:'#d28669',hub:'Fashioncore',p:['fashion','ballet','bimbo','bloke','norm','pride','queer','maid','pearl','art','love','coquette','clean','messy','trash','romantic','emo','punk','style','girl','boy','beauty','model']},
{id:'cosmic',label:'Cosmic, scientific & futurist',color:'#5f79aa',hub:'Spacecore',p:['space','alien','aurora','paleo','star','moon','sun','solar','future','cosmic','planet','astro','scifi','steampunk','seapunk']},
{id:'archive',label:'Archive, knowledge & creative practice',color:'#b3956a',hub:'Archivecore',p:['archive','library','museum','journal','letter','diary','poet','writer','minimal','maximal','quiet','loud','book','study','academia','history','retro','analog','film']},
{id:'lifestyle',label:'Lifestyle, activity & place',color:'#a2a05f',hub:'Campcore',p:['camp','tennis','sport','office','school','work','gym','fitness','travel','airport','mall','hotel','beach','city','suburb','home','room','food','coffee']},
{id:'emotion',label:'Emotion, healing & meaning',color:'#e1a344',hub:'Hopecore',p:['hope','life','comfort','healing','mindful','soft','light','emotion','feeling','peace','happy','joy','calm','wellness']},
{id:'persona',label:'Persona, role & character',color:'#9b83ad',hub:'Dollcore',p:['aliyah','character','persona','avatar','hero','villain','cowboy','pirate','samurai','warrior','clown','doll']}
];
const state={nodes:[],clusters:CLUSTERS.map(x=>({...x,active:true})),images:new Map(),hover:null,selected:null,zoom:1,panX:0,panY:0,drag:false,last:null,query:''};
const canvas=document.getElementById('map'),ctx=canvas.getContext('2d'),stage=document.getElementById('stage'),detail=document.getElementById('detail');
const norm=s=>String(s||'').normalize('NFKD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,'');
function classify(name){const n=norm(name);let best=CLUSTERS[11],score=-1;for(const c of CLUSTERS){let s=norm(c.hub)===n?25:0;for(const p of c.p){const q=norm(p);if(n===q||n===q+'core')s+=6;else if(n.includes(q))s+=2}if(s>score){score=s;best=c}}return best}
function place(){const w=1600,h=1050;state.clusters.forEach((c,i)=>{const a=i/state.clusters.length*Math.PI*2-Math.PI/2;c.cx=Math.cos(a)*w*.34;c.cy=Math.sin(a)*h*.33});const groups=new Map(state.clusters.map(c=>[c.id,[]]));state.nodes.forEach(n=>groups.get(n.cluster.id).push(n));for(const c of state.clusters){const arr=groups.get(c.id).sort((a,b)=>b.count-a.count);arr.forEach((n,i)=>{const ring=Math.floor(Math.sqrt(i));const a=i*2.399963229728653;const d=i===0?0:72+ring*36;n.x=c.cx+Math.cos(a)*d;n.y=c.cy+Math.sin(a)*d;n.r=10+Math.min(22,Math.sqrt(n.count)*1.65)+(i===0?8:0)})}}
function fit(){const r=stage.getBoundingClientRect();state.zoom=Math.min(r.width/2100,r.height/1420);state.panX=0;state.panY=0}
function point(n){const r=stage.getBoundingClientRect();return{x:r.width/2+state.panX+n.x*state.zoom,y:r.height/2+state.panY+n.y*state.zoom}}
function resize(){const r=stage.getBoundingClientRect(),d=Math.min(2,devicePixelRatio||1);canvas.width=r.width*d;canvas.height=r.height*d;canvas.style.width=r.width+'px';canvas.style.height=r.height+'px';ctx.setTransform(d,0,0,d,0,0);draw()}
function draw(){const r=stage.getBoundingClientRect();ctx.clearRect(0,0,r.width,r.height);ctx.save();for(const c of state.clusters){if(!c.active)continue;const p={x:r.width/2+state.panX+c.cx*state.zoom,y:r.height/2+state.panY+c.cy*state.zoom};ctx.beginPath();ctx.arc(p.x,p.y,220*state.zoom,0,Math.PI*2);ctx.fillStyle=c.color+'12';ctx.fill();ctx.strokeStyle=c.color+'35';ctx.lineWidth=1;ctx.stroke();ctx.fillStyle=c.color;ctx.globalAlpha=.8;ctx.font='600 '+Math.max(10,12*state.zoom)+'px Inter, sans-serif';ctx.textAlign='center';ctx.fillText(c.label.toUpperCase(),p.x,p.y-225*state.zoom);ctx.globalAlpha=1}
for(const n of state.nodes){if(!n.cluster.active)continue;const hub=state.nodes.find(x=>x.cluster.id===n.cluster.id&&norm(x.name)===norm(n.cluster.hub))||state.nodes.find(x=>x.cluster.id===n.cluster.id);if(!hub||hub===n)continue;const a=point(hub),b=point(n);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=n.cluster.color+'28';ctx.lineWidth=.8;ctx.stroke()}
for(const n of state.nodes){if(!n.cluster.active)continue;const p=point(n),rr=Math.max(6,n.r*state.zoom);const match=!state.query||n.name.toLowerCase().includes(state.query);ctx.globalAlpha=match?1:.08;ctx.save();ctx.beginPath();ctx.arc(p.x,p.y,rr,0,Math.PI*2);ctx.clip();const im=state.images.get(n.name);if(im&&im.complete&&im.naturalWidth){const s=Math.min(im.naturalWidth,im.naturalHeight),sx=(im.naturalWidth-s)/2,sy=(im.naturalHeight-s)/2;ctx.drawImage(im,sx,sy,s,s,p.x-rr,p.y-rr,rr*2,rr*2)}else{ctx.fillStyle=n.cluster.color;ctx.fillRect(p.x-rr,p.y-rr,rr*2,rr*2)}ctx.restore();ctx.beginPath();ctx.arc(p.x,p.y,rr,0,Math.PI*2);ctx.strokeStyle=state.selected===n?'#fff':n.cluster.color;ctx.lineWidth=state.selected===n?3:1.5;ctx.stroke();if(state.zoom>.55||state.selected===n||state.hover===n||match&&state.query){ctx.fillStyle='#f2f4f7';ctx.font=(state.selected===n?'700 ':'500 ')+Math.max(9,10*state.zoom)+'px Inter, sans-serif';ctx.textAlign='left';ctx.fillText(n.name,p.x+rr+5,p.y+3)}ctx.globalAlpha=1}ctx.restore()}
function hit(x,y){let best=null,d=Infinity;for(const n of state.nodes){if(!n.cluster.active)continue;const p=point(n),rr=Math.max(8,n.r*state.zoom),dd=Math.hypot(x-p.x,y-p.y);if(dd<rr+5&&dd<d){best=n;d=dd}}return best}
function show(n){state.selected=n;if(!n){detail.innerHTML='<div class="empty"><div><span>∞</span><p>Select a core to inspect its field,<br>evidence density, and visual world.</p></div></div>';return}const img=n.paths[0]?ROOT+n.paths[0]:'';detail.innerHTML='<div class="detail">'+(img?'<img src="'+img+'" alt="">':'')+'<div class="cluster">'+n.cluster.label+'</div><h2>'+n.name+'</h2><p>This bubble represents a named internet aesthetic formation. Its position shows the field it currently resembles most; its size reflects the amount of visual material already indexed.</p><div class="meta"><div><small>Indexed graphics</small><b>'+n.count+'</b></div><div><small>Current field</small><b>'+n.cluster.label.split(',')[0]+'</b></div></div><div class="tags">'+n.cluster.p.slice(0,8).map(x=>'<span>'+x+'</span>').join('')+'</div><a class="open" href="'+ROOT+'?core='+encodeURIComponent(n.name)+'" target="_blank">Open '+n.name+' →</a></div>';draw()}
canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect(),n=hit(e.clientX-r.left,e.clientY-r.top);state.hover=n;canvas.style.cursor=state.drag?'grabbing':n?'pointer':'grab';if(state.drag&&state.last){state.panX+=e.clientX-state.last.x;state.panY+=e.clientY-state.last.y;state.last={x:e.clientX,y:e.clientY};draw()}else draw()});
canvas.addEventListener('mousedown',e=>{if(e.button!==0)return;const r=canvas.getBoundingClientRect(),n=hit(e.clientX-r.left,e.clientY-r.top);if(n){show(n)}else{state.drag=true;state.last={x:e.clientX,y:e.clientY}}});
window.addEventListener('mouseup',()=>{state.drag=false;state.last=null});
canvas.addEventListener('dblclick',e=>{const r=canvas.getBoundingClientRect(),n=hit(e.clientX-r.left,e.clientY-r.top);if(n)window.open(ROOT+'?core='+encodeURIComponent(n.name),'_blank')});
canvas.addEventListener('wheel',e=>{e.preventDefault();const before=state.zoom;state.zoom=Math.max(.18,Math.min(2.4,state.zoom*(e.deltaY<0?1.12:.89)));const rect=stage.getBoundingClientRect(),mx=e.clientX-rect.left-rect.width/2-state.panX,my=e.clientY-rect.top-rect.height/2-state.panY;state.panX-=mx*(state.zoom/before-1);state.panY-=my*(state.zoom/before-1);draw()},{passive:false});
document.getElementById('search').addEventListener('input',e=>{state.query=e.target.value.toLowerCase().trim();draw()});
function buildLegend(){const el=document.getElementById('legend');el.innerHTML=state.clusters.map(c=>'<button data-id="'+c.id+'"><i style="background:'+c.color+'"></i>'+c.label+'</button>').join('');el.querySelectorAll('button').forEach(b=>b.onclick=()=>{const c=state.clusters.find(x=>x.id===b.dataset.id);c.active=!c.active;b.classList.toggle('off',!c.active);draw()})}
async function load(){let data=null,lastError=null;for(const u of MANIFESTS){try{const r=await fetch(u,{cache:'no-store'});if(!r.ok)throw Error('HTTP '+r.status);data=await r.json();break}catch(e){lastError=e}}if(!data)throw lastError||Error('Manifest unavailable');state.nodes=Object.entries(data).filter(([name])=>norm(name)!=='cannibalcore').map(([name,paths])=>({name,paths:Array.isArray(paths)?paths:[],count:Array.isArray(paths)?paths.length:0,cluster:classify(name)}));document.getElementById('nodeCount').textContent=state.nodes.length;document.getElementById('imageCount').textContent=state.nodes.reduce((s,n)=>s+n.count,0).toLocaleString();for(const n of state.nodes){if(!n.paths[0])continue;const im=new Image();im.src=ROOT+n.paths[0];im.onload=draw;state.images.set(n.name,im)}place();fit();buildLegend();resize()}
window.addEventListener('resize',resize);load().catch(err=>{detail.innerHTML='<div class="empty"><div><span>!</span><p>The live manifest could not be loaded.<br>'+String(err.message||err)+'</p></div></div>'});
</script>
</body>
</html>
