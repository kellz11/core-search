name: Remove Cannibalcore

on:
  push:
    paths:
      - "scripts/remove-cannibalcore.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  remove:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove Cannibalcore from assets and manifest
        run: python3 scripts/remove-cannibalcore.py

      - name: Commit removal
        run: |
          if git diff --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "Cannibalcore is already removed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove Cannibalcore completely"
          git push
