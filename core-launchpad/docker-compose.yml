services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file: .env
    ports:
      - "3000:3000"
    restart: unless-stopped

  migrator:
    build:
      context: .
      dockerfile: services/migrator/Dockerfile
    env_file: .env
    restart: unless-stopped
    volumes:
      - migration-data:/app/services/migrator/data

volumes:
  migration-data:
